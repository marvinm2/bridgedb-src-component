---
# Role: bridgedb
# Installs Docker, runs BridgeDB container, configures nginx reverse proxy.

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker.io
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add all sudoers-group users to docker group
  ansible.builtin.shell:
    cmd: |
      for user in $(getent group sudoers | cut -d: -f4 | tr ',' ' '); do
        usermod -aG docker "$user" 2>/dev/null || true
      done
  changed_when: true

- name: Pull BridgeDB Docker image
  ansible.builtin.command:
    cmd: "docker pull {{ bridgedb_image }}:{{ bridgedb_tag }}"
  changed_when: true

- name: Get workspace FQDN
  ansible.builtin.command:
    cmd: cat /etc/hostname
  register: workspace_fqdn
  changed_when: false

- name: Run BridgeDB container
  ansible.builtin.command:
    cmd: >
      docker run -d
      --name {{ bridgedb_container_name }}
      --restart always
      -p {{ bridgedb_port }}:8183
      -e SERVER_URL=https://{{ workspace_fqdn.stdout }}
      {{ bridgedb_image }}:{{ bridgedb_tag }}
  changed_when: true

- name: Wait for BridgeDB container to start
  ansible.builtin.pause:
    seconds: 30

- name: Capture BridgeDB startup logs
  ansible.builtin.shell:
    cmd: "docker logs {{ bridgedb_container_name }} > /var/log/bridgedb-startup.log 2>&1"
  changed_when: true

- name: Deploy nginx reverse proxy configuration
  ansible.builtin.template:
    src: nginx-bridgedb.conf.j2
    dest: /etc/nginx/app-location-conf.d/bridgedb.conf
    mode: "0644"
  notify: Reload nginx
