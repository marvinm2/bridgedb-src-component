---
# Role: bridgedb
# Installs Docker, runs BridgeDB container, configures nginx reverse proxy.

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker.io
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Pull BridgeDB Docker image
  ansible.builtin.command:
    cmd: "docker pull {{ bridgedb_image }}:{{ bridgedb_tag }}"
  changed_when: true

- name: Run BridgeDB container
  ansible.builtin.command:
    cmd: >
      docker run -d
      --name {{ bridgedb_container_name }}
      --restart always
      -p {{ bridgedb_port }}:8183
      -e SERVER_URL=localhost:{{ bridgedb_port }}
      {{ bridgedb_image }}:{{ bridgedb_tag }}
  changed_when: true

- name: Wait for BridgeDB container to start
  ansible.builtin.pause:
    seconds: 10

- name: Deploy nginx reverse proxy configuration
  ansible.builtin.template:
    src: nginx-bridgedb.conf.j2
    dest: /etc/nginx/app-location-conf.d/bridgedb.conf
    mode: "0644"
  notify: Reload nginx
